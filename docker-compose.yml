services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iots}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iots}
      POSTGRES_DB: ${POSTGRES_DB:-iots}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iots} -d ${POSTGRES_DB:-iots}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
