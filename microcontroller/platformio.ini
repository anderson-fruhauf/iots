; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
; Deve coincidir com Serial.begin(...) em src/main.cpp
monitor_speed = 115200
; Se "Unable to verify flash chip": use 115200, feche o monitor serial e outro programa na porta.
upload_speed = 115200
lib_deps =
  bblanchon/ArduinoJson@^7.3.0
  knolleary/PubSubClient@^2.8
  beegee-tokyo/DHT sensor library for ESPx@^1.18
  olikraus/U8g2@^2.35.0
build_flags =
  -I include
  ; Inclui libs do framework no compile_commands (compiledb) para o clangd.
  -I "${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src"
  -I "${platformio.packages_dir}/framework-arduinoespressif32/libraries/Wire/src"
  -I "${platformio.packages_dir}/framework-arduinoespressif32/libraries/Ticker/src"
